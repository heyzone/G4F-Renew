name: Game4Free Auto Renew

on:
  workflow_dispatch:
  schedule:
    # 每天 UTC 06:00 执行一次（北京时间 14:00）
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      RENEW_URL:          ${{ secrets.RENEW_URL }}
      SOCKS5_PROXY:       ${{ secrets.SOCKS5_PROXY }}
      GOST_PORT:          "18080"
      MAX_RETRY:          "2"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      # ── 检出 ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 系统依赖 ──
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb wget curl jq

      # ── gost（SOCKS5 → HTTP 代理中转） ──
      - name: Install gost
        run: |
          GOST_VER="2.11.5"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${GOST_VER}/gost-linux-amd64-${GOST_VER}.gz" \
            -O /tmp/gost.gz
          gunzip /tmp/gost.gz
          chmod +x /tmp/gost
          sudo mv /tmp/gost /usr/local/bin/gost
          gost -V

      # ── Node 依赖 + Playwright Chromium ──
      - name: Install Node dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ── 执行续期脚本 ──
      - name: Run renew script
        run: |
          mkdir -p screenshots
          xvfb-run -a node renew.js

      # ── 上传截图（无论成功失败） ──
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          if-no-files-found: warn
          compression-level: 6

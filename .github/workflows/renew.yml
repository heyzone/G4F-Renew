name: Game4Free Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      RENEW_URL:          ${{ secrets.RENEW_URL }}
      SOCKS5_PROXY:       ${{ secrets.SOCKS5_PROXY }}
      GOST_PORT:          "18080"
      MAX_RETRY:          "2"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb wget curl jq p7zip-full

      - name: Install gost
        run: |
          GOST_VER="2.11.5"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${GOST_VER}/gost-linux-amd64-${GOST_VER}.gz" \
            -O /tmp/gost.gz
          gunzip /tmp/gost.gz
          chmod +x /tmp/gost
          sudo mv /tmp/gost /usr/local/bin/gost
          gost -V

      - name: Install Node dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download NopeCHA extension
        run: |
          mkdir -p extensions/nopecha
          wget -q "https://github.com/NopeCHALLC/nopecha-extension/releases/latest/download/chromium.zip" \
            -O extensions/nopecha/chromium.zip

      - name: Unpack NopeCHA extension
        run: |
          mkdir -p extensions/nopecha/unpacked
          7z x -y extensions/nopecha/chromium.zip -oextensions/nopecha/unpacked
          echo "📌 manifest.json:"
          cat extensions/nopecha/unpacked/manifest.json

      - name: Run renew script
        run: |
          mkdir -p screenshots
          xvfb-run -a node renew.js

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          if-no-files-found: warn
          compression-level: 6
